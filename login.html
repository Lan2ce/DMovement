<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Digital Movement</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      color: #fff;
      background: radial-gradient(circle at top center, rgba(241,60,100,0.14) 0%, rgba(230,53,155,0.12) 30%, rgba(220,46,201,0.10) 55%, rgba(17,9,32,0.92) 100%),
                  linear-gradient(180deg, #100a22 0%, #140c35 35%, #1f124f 100%);
      background-attachment: fixed;
    }
    .hero-banner {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -2;
      pointer-events: none;
    }
    .hero-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(17, 9, 32, 0.82);
    }
    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 40px auto;
      padding: 24px;
    }
    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .page-header h1 {
      margin: 0;
      font-size: 2rem;
    }
    .page-header p {
      margin: 8px 0 0;
    }
    .page-header a {
      color: #d80057;
      text-decoration: none;
      font-weight: 600;
    }
    .banner-form {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(16px);
    }
    .form-content h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 1.7rem;
    }
    .wpcf7-form-control-wrap input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 1rem;
      box-sizing: border-box;
      margin-bottom: 2rem !important;
    }
    .form-content input[type="submit"] {
      width: 100%;
      padding: 14px 16px;
      border: 0;
      border-radius: 10px;
      background: #d80057;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 10px;
    }
    .form-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.95rem;
    }
    .form-footer a {
      color: #d80057;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <section class="hero-banner">
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="https://www.digitalmovement.com.au/wp-content/uploads/2025/12/DM_Final_banner.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="hero-overlay"></div>
  </section>
  <div class="page-wrapper">
    <header class="page-header">
      <h1>Login</h1>
      <p>Need an account? <a href="registration.html">Register here</a></p>
    </header>
    <div class="banner-form">
      <form action="#" method="post" class="wpcf7-form init" novalidate>
        <div class="form-content">
          <h2>Login to your account</h2>
          <span class="wpcf7-form-control-wrap" data-name="username">
            <input type="text" name="username" placeholder="Username" required>
          </span>
          <span class="wpcf7-form-control-wrap" data-name="password">
            <input type="password" name="password" placeholder="Password" required>
          </span>
          <input class="wpcf7-form-control wpcf7-submit has-spinner" type="submit" value="Login">
        </div>
      </form>
    </div>
    <div class="form-footer">
      <p><a href="registration.html">Register an account</a></p>
    </div>
  </div>
</body>
</html>
